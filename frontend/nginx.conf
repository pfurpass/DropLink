server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # No upload size cap at nginx — backend enforces MAX_FILE_SIZE_MB
  client_max_body_size 0;

  # Long timeouts for multi-GB uploads streamed through the proxy
  proxy_connect_timeout 1h;
  proxy_send_timeout    1h;
  proxy_read_timeout    1h;
  send_timeout          1h;

  # Proxy API and auth endpoints to the backend service
  location ~ ^/api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Stream the request body straight through instead of buffering to disk
    proxy_request_buffering off;
    proxy_buffering         off;
  }

  # SPA fallback — serve index.html for any non-asset path
  location / {
    try_files $uri $uri/ /index.html;
  }
}
